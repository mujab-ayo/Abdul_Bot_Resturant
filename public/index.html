<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdul_Bot_Resturant!</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #f0f0f0;
      }

      .convo {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bubble {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 18px;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .bot {
        background: #ffffff;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .user {
        background: #007bff;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid #ddd;
        gap: 10px;
      }

      #userInput {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 20px;
        outline: none;
        font-size: 14px;
      }

      #sendBtn {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="convo"></div>
    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Type your message here..."
      />
      <button id="sendBtn">Send</button>
    </div>
    <script>
      document.getElementById("sendBtn").addEventListener("click", handleSend);
      document.getElementById("userInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSend();
      });

      function displayPayButton(url) {
        const convo = document.querySelector(".convo");
        const btn = document.createElement("a");
        btn.href = url;
        btn.target = "_blank";
        btn.innerText = "💳 Pay Now";
        btn.style.cssText = `
              display: inline-block;
              background: #007bff;
              color: white;
              padding: 10px 24px;
              border-radius: 20px;
              text-decoration: none;
              font-size: 14px;
              align-self: flex-start;
              margin-top: 4px;
            `;
        convo.appendChild(btn);
        convo.scrollTop = convo.scrollHeight;
      }

      async function handleSend() {
        const input = document.getElementById("userInput");
        const userMessage = input.value.trim();
        if (!userMessage) return;

        displayMessage(userMessage, "user");
        input.value = "";

        const result = await fetchChat(userMessage);
        displayMessage(result.message, "bot");

        if (result.paymentUrl) {
          displayPayButton(result.paymentUrl);
        }
      }

      window.addEventListener("load", async () => {
        const params = new URLSearchParams(window.location.search);

        if (params.get("payment") === "success") {
          displayMessage(
            "Payment successful! Thank you for your order.",
            "bot",
          );
        } else if (params.get("payment") === "failed") {
          displayMessage("Payment failed. Please try again.", "bot");
        }

        const response = await fetch("/api/chat");
        const data = await response.json();
        displayMessage(data.message, "bot");
      });

      function displayMessage(text, sender) {
        const convo = document.querySelector(".convo");
        const bubble = document.createElement("div");
        bubble.classList.add("bubble", sender);
        bubble.innerText = text;
        convo.appendChild(bubble);
        convo.scrollTop = convo.scrollHeight;
      }

      const fetchChat = async (userMessage) => {
        try {
          const response = await fetch("/api/chat/send-message", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: userMessage }),
          });

          if (!response.ok) {
            throw new Error("Network response was not ok");
          }

          const data = await response.json();
          return data;
        } catch (error) {
          console.error("Error fetching chat:", error);
          return { message: "Sorry, I couldn't process your request." };
        }
      };
    </script>
  </body>
</html>
